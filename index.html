            background-size: 100% 100%;
            background-position: center;
            background-attachment: fixed;
            color: #bfbfbf;
            font-family: 'Ulm Grotesk Extrabold', sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    

        header {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeIn 1s forwards;
        }

        h1 {
            font-size: 36px;
            margin: 8px 0;
            color: #f0f0f0;
        }

        p {
            margin: 4px 0;
            font-size: 18px;

        }
        
        .warning {
            color: red;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s 0.5s forwards; /* Задержка для кнопок */
        }

        img {
            margin: 45px 0;
            border-radius: 100px;
        }

        .button {
            background: rgba(114, 111, 121, 0.8);
            border: none;
            border-radius: 50px;
            color: #ffffff;
            padding: 12px 24px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            width: 200px;
            margin: 4px 0;
            transition: background 0.3s, transform 0.2s;
        }

        .button:hover {
            background: #3b3b3c;
            transform: translateY(-2px);
        }

        footer {
            color: #b0b0b0;
            font-size: 12px;
            margin-top: 5;
            opacity: 0;
            animation: fadeIn 1s 1s forwards; /* Задержка для футера */
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
